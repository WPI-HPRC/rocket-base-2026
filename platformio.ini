; PlatformIO Project Configuration File

;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
boards_dir = mars-board-definitions/boards

[env:flatbuffer_decoder]
platform = native
extra_scripts = pre:scripts/generate_flatbuffers.py
lib_deps =
framework =
build_src_filter = -<*> +<../flatbuffer_decoder/**/*.cpp>

[env:speed_test]
platform = ststm32
framework = arduino
board = marsv21
board_build.variants_dir = mars-board-definitions/variants
lib_deps =
	https://github.com/stm32duino/STM32SD.git
	https://github.com/stm32duino/FatFs.git
build_src_filter = -<*> +<../speed_test/**/*.cpp>

[env:marsv21]
platform = ststm32
framework = arduino
board = marsv21
board_build.variants_dir = mars-board-definitions/variants
extra_scripts = pre:scripts/generate_flatbuffers.py
build_flags =
	-DFLATBUFFERS_NO_PRINTF    ; lighter runtime for embedded
lib_deps =
	stm32duino/STM32duino ASM330LHH@^2.0.1
	stm32duino/STM32duino LIS2MDL@^2.0.1
	stm32duino/STM32duino LPS22HB@^2.0.0
	stm32duino/STM32duino LSM6DSO32@^1.0.0
	stm32duino/STM32duino X-NUCLEO-GNSS1A1@^1.0.5
 	stevemarple/MicroNMEA@^2.0.6
	# https://github.com/WPI-HPRC/STM32SD.git
	https://github.com/stm32duino/STM32SD.git
	https://github.com/stm32duino/FatFs.git
	tomstewart89/BasicLinearAlgebra @ ^5.1
	Wire
	SPI
	Servo
	IWatchdog
	tomstewart89/BasicLinearAlgebra@^5.1
	thijse/ArduinoLog@^1.1.1

[env:marsv20]
platform = ststm32
framework = arduino
board = marsv20
board_build.variants_dir = mars-board-definitions/variants
extra_scripts = pre:scripts/generate_flatbuffers.py
build_flags =
	-DFLATBUFFERS_NO_PRINTF    ; lighter runtime for embedded
lib_deps =
	stm32duino/STM32duino ASM330LHH@^2.0.1
	stm32duino/STM32duino LIS2MDL@^2.0.1
	stm32duino/STM32duino LPS22HB@^2.0.0
	stm32duino/STM32duino LSM6DSO32@^1.0.0
	stm32duino/STM32duino X-NUCLEO-GNSS1A1@^1.0.5
 	stevemarple/MicroNMEA@^2.0.6
	# https://github.com/WPI-HPRC/STM32SD.git
	https://github.com/stm32duino/STM32SD.git
	https://github.com/stm32duino/FatFs.git
	tomstewart89/BasicLinearAlgebra @ ^5.1
	Wire
	SPI
	Servo
	IWatchdog
	tomstewart89/BasicLinearAlgebra@^5.1
	thijse/ArduinoLog@^1.1.1
